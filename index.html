<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background-color: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 0;
        }
        header {
            background: #35424a;
            color: #ffffff;
            padding: 15px 20px;
            text-align: center;
            transition: background 0.3s ease;
        }
        header:hover {
            background: #465a68;
        }
        h1, h2, h3 {
            color: #35424a;
        }
        a {
            color: #35424a;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        a:hover {
            color: #465a68;
        }
        main {
            padding: 20px;
            margin: 20px auto;
            max-width: 800px;
            background: #ffffff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 5px;
            transition: box-shadow 0.3s ease;
        }
        main:hover {
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }
        footer {
            text-align: center;
            padding: 10px 0;
            background: #35424a;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Website</h1>
    </header>
    <main>
        <h2>Welcome to My Website</h2>
        <p>This is a simple website to demonstrate enhanced CSS improvements for better visual design.</p>
    </main>
    <footer>
        <p>&copy; 2026 by Joseph Maguire</p>
    </footer>
</body>
</html>
